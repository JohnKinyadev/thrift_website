<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thrift Boutique — Product</title>
    <meta name="description" content="Product detail page for the thrift boutique demo." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="nav-container">
        <a class="brand" href="index.html" aria-label="Thrift Boutique home">Thrift Boutique</a>
        <nav class="main-nav" aria-label="Main navigation">
          <a href="index.html" data-page="home">Home</a>
          <a href="products.html" data-page="shop">Shop</a>
          <a href="cart.html" class="cart-link" data-page="cart">
            Cart <span class="cart-count" aria-label="Cart items">0</span>
          </a>
          <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
          <button class="menu-toggle" aria-label="Open navigation menu">☰</button>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div id="productContainer" class="product-view"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-container">
        <div class="footer-col">
          <h4>Thrift Boutique</h4>
          <p>
            A playful, lightweight storefront demo built with HTML, CSS, and JavaScript. Your cart
            lives in local storage, so your favorites stay saved between visits.
          </p>
        </div>
        <div class="footer-col">
          <h4>Explore</h4>
          <a href="index.html">Home</a>
          <a href="products.html">Shop</a>
          <a href="cart.html">Cart</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; <span id="dateYear"></span> Thrift Boutique. Made with ♡.</p>
      </div>
    </footer>

    <script src="products.js" defer></script>
    <script src="scripts.js" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initSite("shop");
        document.getElementById("dateYear").textContent = new Date().getFullYear();

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const container = document.getElementById("productContainer");

        function renderNotFound() {
          container.innerHTML = `
            <div class="cart-empty">
              <h3>Product not found</h3>
              <p>We couldn't find that item—try browsing the shop to discover more.
              </p>
              <a href="products.html" class="btn btn-primary">Browse products</a>
            </div>
          `;
        }

        if (!id) {
          renderNotFound();
          return;
        }

        const product = getProductById(id);
        if (!product) {
          renderNotFound();
          return;
        }

        let quantity = 1;

        container.innerHTML = `
          <div class="product-gallery">
            ${product.images
              .slice(0, 4)
              .map(
                (src) => `<img src="${src}" alt="${product.title}" loading="lazy" />`
              )
              .join("")}
          </div>
          <div class="product-details">
            <a href="products.html" class="btn btn-secondary btn-sm">← Back to shop</a>
            <h2>${product.title}</h2>
            <p class="price">${formatPrice(product.price)}</p>
            <div class="meta">
              <span>Category: ${product.category}</span>
              <span>Rating: ${product.rating} ★</span>
            </div>
            <p>${product.description}</p>
            <div class="actions">
              <div class="quantity" role="group" aria-label="Quantity selector">
                <button type="button" id="qtyDown" aria-label="Decrease quantity">−</button>
                <input id="qtyInput" type="number" value="1" min="1" aria-label="Item quantity" />
                <button type="button" id="qtyUp" aria-label="Increase quantity">+</button>
              </div>
              <button class="btn btn-primary" id="addToCartBtn" type="button">Add to cart</button>
            </div>
          </div>
        `;

        const qtyInput = document.getElementById("qtyInput");
        const qtyUp = document.getElementById("qtyUp");
        const qtyDown = document.getElementById("qtyDown");
        const addToCartBtn = document.getElementById("addToCartBtn");

        const syncQuantity = () => {
          const value = Number(qtyInput.value);
          quantity = Number.isNaN(value) || value < 1 ? 1 : Math.floor(value);
          qtyInput.value = quantity;
        };

        qtyUp.addEventListener("click", () => {
          quantity += 1;
          qtyInput.value = quantity;
        });

        qtyDown.addEventListener("click", () => {
          if (quantity > 1) {
            quantity -= 1;
            qtyInput.value = quantity;
          }
        });

        qtyInput.addEventListener("change", syncQuantity);

        addToCartBtn.addEventListener("click", () => {
          syncQuantity();
          addToCart(product.id, quantity);
          showToast("Added to cart", { type: "success" });
        });
      });
    </script>
  </body>
</html>
